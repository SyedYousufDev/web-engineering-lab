<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task # 04: Callback</title>
</head>
<body>
    <script>
  function processData(data) {
    console.log("Processing:", data);
  }

  function getData(callback) {
    const data = "Hello from getData!";
    callback(data);
  }

  getData(processData);
</script>
</body>
</html>
