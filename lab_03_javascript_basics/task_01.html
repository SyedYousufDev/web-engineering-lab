<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task_01_Adding_javascript</title>
    <script>
        function showMessage() {
            alert("JavaScript placed in HEAD section!");}
    </script>
</head>
<body>
    <!--Javascript in head-->
    <h2>JavaScript in Head</h2>
    <button onclick="showMessage()">Click Me</button>

    <!--Javascript in body-->
     <h2>JavaScript in Body</h2>
    <button onclick="showMessage1()">Click Me</button>
    <script>
        function showMessage1() {
            alert("JavaScript placed in BODY section!");
        }
    </script>
    
    <!--Javascript in External file-->
     <script src="task_01.js"></script>
     <h2>JavaScript in External file</h2>
    <button onclick="showMessage2()">Click Me</button>
</body>
</html>
